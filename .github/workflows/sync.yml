name: Sync Fork with Upstream

   on:
     schedule:
       - cron: '0 * * * *'
     workflow_dispatch:

   jobs:
     sync:
       runs-on: ubuntu-latest
       steps:
         - uses: actions/checkout@v3
           with:
             token: ${{ secrets.GITHUB_TOKEN }}
             fetch-depth: 0

         - name: Sync with upstream
           run: |
             git remote add upstream https://github.com/Alex8338/FCL-forecasting-model.git
             git fetch upstream
             git checkout main
             git merge upstream/main --no-edit
             git push origin main
